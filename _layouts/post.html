---
layout: default
---
<article class="post">
  <header class="post-header">
    {% include post-meta.html post=page %}
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  <div class="post-body reading-flow">
    {{ content }}
  </div>
  <div class="post-tags-bottom">
    {% if page.tags %}
    <ul class="tag-list">
      {% for tag in page.tags %}
      <li><span class="tag-pill">{{ tag }}</span></li>
      {% endfor %}
    </ul>
    {% endif %}
  </div>
</article>
